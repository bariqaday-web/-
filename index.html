<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أربيل رويال | النظام الشامل</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #3e5c5c; --accent: #5bb5a2; --glass: rgba(255, 255, 255, 0.2); --border: rgba(255, 255, 255, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%); background-attachment: fixed; min-height: 100vh; padding-bottom: 80px; }
        header { position: sticky; top: 0; z-index: 1000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        
        .side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: rgba(62, 92, 92, 0.95); backdrop-filter: blur(15px); z-index: 3000; transition: 0.4s; padding: 40px 20px; }
        .side-menu.active { right: 0; }
        .side-menu a { display: flex; align-items: center; color: white; padding: 18px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .page { display: none; padding: 25px 6%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .property-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .property-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        .category-buttons { display: flex; gap: 10px; justify-content: center; padding: 20px 0; overflow-x: auto; }
        .cat-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: white; }

        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 2000; }
        .nav-btn { color: #7f8c8d; text-decoration: none; text-align: center; font-size: 0.7rem; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .nav-btn i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .submit-btn { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-bars-staggered" onclick="toggleMenu()" style="font-size: 1.4rem; color: var(--primary);"></i>
        <div style="font-weight: 700; color: var(--primary);">أربيل رويال</div>
        <i class="far fa-bell" onclick="showPage('notifications')" style="font-size: 1.4rem; color: var(--primary);"></i>
    </header>

    <div class="side-menu" id="sideNav">
        <div style="text-align: left; color: white; margin-bottom: 30px;" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
        <a href="#" onclick="showPage('about')"><i class="fas fa-building"></i> من نحن</a>
        <a href="#" onclick="showPage('contact')"><i class="fas fa-phone-alt"></i> اتصل بنا</a>
        <a href="#" onclick="showPage('invest')"><i class="fas fa-chart-line"></i> تعلم الاستثمار</a>
        <a href="#" onclick="showPage('privacy')"><i class="fas fa-user-shield"></i> الخصوصية</a>
    </div>

    <div id="home" class="page active">
        <div class="category-buttons">
            <button class="cat-btn active" onclick="filterByType('all', this)">الكل</button>
            <button class="cat-btn" onclick="filterByType('villa', this)">فلل</button>
            <button class="cat-btn" onclick="filterByType('apartment', this)">شقق</button>
            <button class="cat-btn" onclick="filterByType('house', this)">بيوت</button>
        </div>
        <div id="propertiesContainer" class="property-grid"></div>
    </div>

    <div id="about" class="page"><h2 class="section-title">من نحن</h2><div id="about_content" class="content-body"></div></div>
    <div id="contact" class="page">
        <h2 class="section-title">تواصل معنا</h2>
        <div class="content-body contact-form">
            <input type="text" id="cust_name" placeholder="الاسم الكامل">
            <input type="tel" id="cust_phone" placeholder="رقم الهاتف">
            <textarea id="cust_msg" placeholder="استفسارك..." rows="4"></textarea>
            <button onclick="sendMessage()" class="submit-btn">إرسال</button>
        </div>
    </div>

    <div id="favorites" class="page"><h2 class="section-title">المفضلة</h2><div id="favContainer" class="property-grid"></div></div>
    <div id="notifications" class="page"><h2 class="section-title">التنبيهات</h2><div id="notifContainer" class="content-body">لا توجد تنبيهات حالياً.</div></div>

    <nav class="nav-bottom">
        <div class="nav-btn active" onclick="showPage('home')"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-btn" onclick="showPage('favorites')"><i class="far fa-heart"></i>المفضلة</div>
        <div class="nav-btn" onclick="showPage('notifications')"><i class="far fa-bell"></i>التنبيهات</div>
        <div class="nav-btn" onclick="showPage('contact')"><i class="far fa-envelope"></i>تواصل</div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jmsmrojtlstppnpwmkkk.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_tegHrQjpG27hHsymIJz6YQ_EkH19LVI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. وظيفة عرض العقارات (المحرك الرئيسي للواجهة)
        function displayProperties(data) {
            const container = document.getElementById('propertiesContainer');
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة.</div>';
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="property-card">
                    <img src="${item.image_url}" style="width:100%; height:200px; object-fit:cover;">
                    <div style="padding:15px; position: relative;">
                        <h3>${item.title}</h3>
                        <p>${item.location || 'أربيل'}</p>
                        <b style="color:var(--accent)">${item.price}</b>
                        <i class="far fa-heart" onclick="addToFavorites(${item.id})" 
                           style="position: absolute; left: 15px; bottom: 15px; color: #e74c3c; cursor: pointer;"></i>
                    </div>
                </div>`).join('');
        }

        // 2. جلب العقارات مع الفلترة (محرك البحث)
        async function loadProperties() {
            const { data, error } = await supabaseClient.from('properties').select('*');
            if (!error) displayProperties(data);
        }

        async function filterByType(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let query = supabaseClient.from('properties').select('*');
            if (category !== 'all') query = query.eq('type', category);
            const { data } = await query;
            displayProperties(data);
        }

        // 3. إضافة للمفضلة (تتطلب تسجيل دخول)
        async function addToFavorites(propertyId) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return alert("يرجى تسجيل الدخول أولاً");
            const { error } = await supabaseClient.from('favorites').insert([{ user_id: user.id, property_id: propertyId }]);
            alert(error ? "موجود بالفعل في المفضلة" : "تمت الإضافة ❤️");
        }

        // 4. إرسال الرسائل
        async function sendMessage() {
            const name = document.getElementById('cust_name').value;
            const phone = document.getElementById('cust_phone').value;
            const msg = document.getElementById('cust_msg').value;
            const { error } = await supabaseClient.from('messages').insert([{ full_name: name, phone_number: phone, message_body: msg }]);
            if (!error) { alert("تم الإرسال!"); document.querySelectorAll('.contact-form input, textarea').forEach(i => i.value = ''); }
        }

        // 5. التحكم في الصفحات
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('sideNav').classList.remove('active');
            window.scrollTo(0,0);
        }

        function toggleMenu() { document.getElementById('sideNav').classList.toggle('active'); }

        // التشغيل الأولي
        document.addEventListener('DOMContentLoaded', loadProperties);
    </script>
</body>
</html>
